# Nginx reverse proxy for AI Cargo API on Hostinger VPS
# Install path (typical): /etc/nginx/sites-available/ai-cargo
# Then: sudo ln -s /etc/nginx/sites-available/ai-cargo /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
#
# Replace:
#   api.yourdomain.com  → your API subdomain
#   your-frontend.vercel.app → your Vercel app (optional, for reference)

server {
    listen 80;
    server_name api.yourdomain.com;

    # Large telemetry / batch payloads
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Required for FastAPI WebSockets (Agent Activity live feed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Orchestrator / LLM calls can be slow
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# After DNS points here, enable HTTPS:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d api.yourdomain.com
